{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>編輯個人資料</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 24px; background: #f8f8f8; }
        .container { max-width: 520px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 0 12px rgba(0,0,0,0.08); }
        .field { margin-bottom: 16px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .errorlist { color: #c00; margin-top: 4px; font-size: 0.95rem; }
        .messages { margin-bottom: 16px; color: #0a7; }
        button { padding: 12px 18px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #004c9a; }
    </style>
</head>
<body>
<div class="container">
    <h1>編輯個人資料</h1>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
            <div class="field">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div class="errorlist">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit">儲存變更</button>
    </form>
</div>
</body>
</html>
